version: "3.8"

services:
  # IoT Edge Device Emulator - Resource-constrained testing environment
  pqc-benchmark:
    build:
      context: ..
      dockerfile: docker-emulation-benchmarks/Dockerfile

    container_name: iot-crypto-benchmark

    # Resource constraints to emulate Raspberry Pi Zero W
    # CPU: ARM11 @ 1GHz (single core) - throttled to 0.5 cores
    # RAM: 512MB total
    deploy:
      resources:
        limits:
          cpus: "0.5" # 50% of one CPU core
          memory: 512M # 512 megabytes RAM
        reservations:
          cpus: "0.25" # Minimum guaranteed CPU
          memory: 256M # Minimum guaranteed memory

    # Mount source code for live development
    volumes:
      - ./benchmarks:/app/benchmarks
      - ../src:/app/src
      - ./iot-benchmark-results:/app/iot-benchmark-results

    # Keep container running for interactive testing
    stdin_open: true
    tty: true

    # Override default command if needed
    # command: tail -f /dev/null  # Keeps container alive for manual testing

