services:
  # IoT Edge Device Emulator - Resource-constrained testing environment
  pqc-benchmark:
    cpus: 0.5
    mem_limit: 1028m
    cpuset: "0"
    build:
      context: ..
      dockerfile: docker-emulation-benchmarks/Dockerfile

    container_name: iot-crypto-benchmark

    # Mount source code for live development
    volumes:
      - ./benchmarks:/app/benchmarks
      - ../src:/app/src
      - ./iot-benchmark-results:/app/iot-benchmark-results

    # Keep container running for interactive testing
    stdin_open: true
    tty: true

    # Override default command if needed
    # command: tail -f /dev/null  # Keeps container alive for manual testing

  # Optional: Monitoring service to track resource usage during tests
  # Uncomment to enable resource monitoring
  # monitor:
  #   image: nicolaka/netshoot
  #   container_name: resource-monitor
  #   command: >
  #     sh -c "while true; do
  #       docker stats iot-crypto-benchmark --no-stream --format
  #       'CPU: {{.CPUPerc}} | MEM: {{.MemUsage}}' >> /results/resource-usage.log;
  #       sleep 1;
  #     done"
  #   volumes:
  #     - ./iot-benchmark-results:/results
  #   depends_on:
  #     - pqc-benchmark
